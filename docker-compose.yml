version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: credit_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV=development
      - DEBUG=true
      - DATABASE_URL=sqlite:///./credit_processing.db
      - LOG_LEVEL=INFO
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: credit_frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
